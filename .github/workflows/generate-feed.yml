name: Generate X Feed
on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟运行一次，每批处理5个用户
  workflow_dispatch:       # 允许手动触发
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # 每批处理约15分钟，设置20分钟超时
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Generate feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: node scripts/generate-feed.js --tweets-only
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json state-feed.json
          git diff --cached --quiet || git commit -m "Update feed [skip ci]"
          git push