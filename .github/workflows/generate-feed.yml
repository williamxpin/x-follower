name: Generate X Feed
on:
  schedule:
    - cron: '0 6 * * *'  # 每天 UTC 6:00（北京时间 14:00）
  workflow_dispatch:       # 允许手动触发
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Generate feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: node scripts/generate-feed.js
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json state-feed.json
          git diff --cached --quiet || git commit -m "Update feed [skip ci]"
          git push