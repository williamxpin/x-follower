name: Generate X Feed
on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 运行一次
  workflow_dispatch:       # 允许手动触发
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 小时，足够处理 120+ 用户
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Generate feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: node scripts/generate-feed.js --tweets-only
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --no-rebase
          git add feed-x.json state-feed.json
          git diff --cached --quiet || git commit -m "Update feed [skip ci]"
          git push